        ca-ES,
        chr-Cher-US,
        cnr-Latn-ME,
        cs-CZ,
        cy-GB,
        da-DK,
        de-AT,
        de-CH,
        de-DE,
        el-GR,
        en-AU,
        en-CA,
        en-GB,
        en-IN,
        en-NZ,
        en-US,
        es-AR,
        es-CL,
        es-CO,
        es-ES,
        es-MX,
        es-PE,
        es-UY,
        et-EE,
        eu-ES,
        fa-IR,
        ff-Latn-SN,
        fi-FI,
        fil-PH,
        fr-CA,
        fr-CH,
        fr-FR,
        fy-NL,
        ga-IE,
        gd-GB,
