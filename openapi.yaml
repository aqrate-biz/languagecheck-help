swagger: "2.0"

# ---------------------------------------------------------------------------
# Info
# ---------------------------------------------------------------------------
info:
  title: LanguageCheck API
  description: |
    These are the APIs for LanguageCheck (languagecheck.ai), enabling direct access to its services through RESTful calls.
  version: "2.1.0"
  termsOfService: https://languagecheck.ai/terms
  contact:
    name: LanguageCheck crew
    url: https://languagecheck.ai
    email: crew@languagecheck.ai

# ---------------------------------------------------------------------------
# Server & Configurazione Endpoint GCP
# ---------------------------------------------------------------------------

host: api.languagecheck.ai
basePath: /v2
schemes:
  - https

# ---------------------------------------------------------------------------
# Global security: API key required on all endpoints
# ---------------------------------------------------------------------------
security:
  - ApiKeyAuth: []

securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: X-API-Key

definitions:
  ApiResponse:
    type: object
    required:
      - success
      - status
      - message
      - metadata
    properties:
      success:
        type: boolean
        description: Outcome of the request
        example: true
      status:
        type: integer
        description: HTTP status code of the response
        example: 200
      message:
        type: string
        description: Descriptive message for the outcome
        example: "Operation completed successfully"
      metadata:
        $ref: "#/definitions/ResponseMetadata"
      errors:
        type: array
        description: List of errors (null on success)
        items:
          $ref: "#/definitions/ApiError"
        example: null
  ResponseMetadata:
    type: object
    required:
      - timestamp
      - requestId
      - version
      - requestReceivedAt
      - processingTimeMs
      - user
      - apiKey
    properties:
      timestamp:
        type: string
        format: date-time
        description: UTC timestamp of the response
        example: "2024-05-09T12:00:00Z"
      requestId:
        type: string
        description: Unique request ID (useful for debugging)
        example: "a3f92c1d-8e74-4b2a-bc01-f3d9e5a71c88"
      version:
        type: string
        description: API version
        example: "v2"
      requestReceivedAt:
        type: string
        format: date-time
        description: UTC timestamp when the request was received
        example: "2024-05-09T12:00:00Z"
      processingTimeMs:
        type: integer
        description: Time taken to process the request in milliseconds
        example: 123
      user:
        type: string
        description: User identifier (e.g., email) associated with the request (if available)
        example: "user@example.com"
      apiKey:
        type: string
        description: API key used for the request (if available)
        example: "api_key_123"
  ApiError:
    type: object
    required:
      - code
      - message
    properties:
      code:
        type: string
        description: Error identifier code
        example: "VALIDATION_ERROR"
      field:
        type: string
        description: Field involved (optional, for validation errors)
        example: "email"
      message:
        type: string
        description: Human-readable error description
        example: "The email format is not valid"
  Status:
    type: object
    required:
      - system
      - ai
    properties:
      system:
        type: string
        enum:
          [
            operational,
            degraded_performance,
            partial_outage,
            major_outage,
            under_maintenance,
          ]
        description: Operational status of the system
        example: operational
      ai:
        type: string
        enum:
          [
            operational,
            degraded_performance,
            partial_outage,
            major_outage,
            under_maintenance,
          ]
        description: Operational status of the AI service
        example: operational
  CheckResult:
    type: object
    required:
      - evaluation
      - isAmbiguous
      - minorErrors
      - majorErrors
      - fluencyIssues
      - minorErrorsExplanation
      - majorErrorsExplanation
      - fluencyIssuesExplanation
      - words
    properties:
      evaluation:
        type: string
        description: Evaluation result
        example: "pass"
      isAmbiguous:
        type: boolean
        description: Indicates if the result is ambiguous
        example: false
      minorErrors:
        type: boolean
        description: Indicates if there are minor errors
        example: true
      majorErrors:
        type: boolean
        description: Indicates if there are major errors
        example: false
      fluencyIssues:
        type: boolean
        description: Indicates if there are fluency issues
        example: true
      minorErrorsExplanation:
        type: string
        description: Explanation of minor errors
        example: "Minor spelling mistakes"
      majorErrorsExplanation:
        type: string
        description: Explanation of major errors
        example: ""
      fluencyIssuesExplanation:
        type: string
        description: Explanation of fluency issues
        example: "Some sentences are awkwardly phrased"
      words:
        type: integer
        description: Number of words in the source text
        example: 10
  WalletInfo:
    type: object
    required:
      - words
      - lastUpdated
    properties:
      words:
        type: integer
        description: Number of words remaining in the user's wallet
        example: 1500
      lastUpdated:
        type: string
        format: date-time
        description: UTC timestamp of the last wallet update
        example: "2024-05-09T12:00:00Z"
  StatusResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            $ref: "#/definitions/Status"
  CheckResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            $ref: "#/definitions/CheckResult"
  WalletResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            $ref: "#/definitions/WalletInfo"
  ErrorApiResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            type: string
            description: Always null in case of error
            example: null
